services:
  - type: web
    name: ibs-fighter
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn ibs_fighter.wsgi:app --bind 0.0.0.0:$PORT
    healthCheckPath: /healthz
    disk:
      name: ibs-fighter-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.1
      - key: IBS_FIGHTER_DATA_DIR
        value: /var/data/data
      - key: IBS_FIGHTER_UPLOADS_DIR
        value: /var/data/uploads
      - key: IBS_FIGHTER_COOKIE_SECURE
        value: "1"
      - key: IBS_FIGHTER_SESSION_DAYS
        value: "360"
      - key: IBS_FIGHTER_DEFAULT_TIMEZONE
        value: Pacific/Guadalcanal
      - key: IBS_FIGHTER_LEGACY_TIMEZONE
        value: Pacific/Port_Moresby
      - key: GOOGLE_ALLOWED_EMAILS
        value: gluebi.d.mao@gmail.com
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_DRIVE_BACKUP_FOLDER_ID
        sync: false
      - key: BACKUP_ADMIN_TOKEN
        generateValue: true
